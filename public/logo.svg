<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="1200" height="400" viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="flameGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B; stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F97316; stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Rocket Body -->
  <g transform="translate(120,200) rotate(-20)">
    <!-- Main body -->
    <ellipse cx="0" cy="0" rx="60" ry="100" fill="#2563EB"/>

    <!-- Nose cone -->
    <polygon points="-60,-100 60,-100 0,-170" fill="#F97316"/>

    <!-- Left fin -->
    <polygon points="-60,40 -120,120 -40,90" fill="#1E40AF"/>

    <!-- Right fin -->
    <polygon points="60,40 120,120 40,90" fill="#1E40AF"/>

    <!-- Window -->
    <circle cx="0" cy="-10" r="35" fill="white"/>
    <circle cx="0" cy="-10" r="25" fill="#F59E0B"/>

    <!-- Simple robot face -->
    <circle cx="-8" cy="-15" r="4" fill="#1F2937"/>
    <circle cx="8" cy="-15" r="4" fill="#1F2937"/>
    <path d="M -10 0 Q 0 10 10 0" stroke="#1F2937" stroke-width="3" fill="none"/>

    <!-- Flame -->
    <polygon points="-20,100 20,100 0,180" fill="url(#flameGrad)"/>
  </g>

  <!-- Wordmark -->
  <text x="320" y="230" font-family="Outfit, Arial, sans-serif" font-size="110" font-weight="700" fill="#2563EB">
    Teach
  </text>
  <text x="670" y="230" font-family="Outfit, Arial, sans-serif" font-size="110" font-weight="700" fill="#F59E0B">
    AI
  </text>
  <text x="820" y="230" font-family="Plus Jakarta Sans, Arial, sans-serif" font-size="80" font-weight="500" fill="white">
    Early.com
  </text>
</svg>
