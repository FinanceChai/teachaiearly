<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg viewBox="0 0 1100 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="flameGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="100%" stop-color="#2DD4BF"/>
    </linearGradient>
  </defs>

  <!-- Rocket Group -->
  <g transform="translate(110,165) rotate(-18)">
    <!-- Body -->
    <ellipse cx="0" cy="0" rx="45" ry="75" fill="#14B8A6"/>

    <!-- Nose -->
    <polygon points="-45,-75 45,-75 0,-130" fill="#2DD4BF"/>

    <!-- Fins -->
    <polygon points="-45,30 -90,90 -30,65" fill="#0F766E"/>
    <polygon points="45,30 90,90 30,65" fill="#0F766E"/>

    <!-- Window -->
    <circle cx="0" cy="-5" r="26" fill="#E5E7EB"/>
    <circle cx="0" cy="-5" r="18" fill="#14B8A6"/>

    <!-- Face -->
    <circle cx="-6" cy="-10" r="3" fill="#0B1B2B"/>
    <circle cx="6" cy="-10" r="3" fill="#0B1B2B"/>
    <path d="M -8 2 Q 0 8 8 2" stroke="#0B1B2B" stroke-width="2" fill="none"/>

    <!-- Flame -->
    <polygon points="-14,75 14,75 0,130" fill="url(#flameGrad)"/>
  </g>

  <!-- Wordmark -->
  <text x="260" y="185" font-family="Outfit, Arial, sans-serif" font-size="90" font-weight="700" fill="#E5E7EB">
    Teach
  </text>
  <text x="560" y="185" font-family="Outfit, Arial, sans-serif" font-size="90" font-weight="700" fill="#2DD4BF">
    AI
  </text>
  <text x="680" y="185" font-family="Plus Jakarta Sans, Arial, sans-serif" font-size="65" font-weight="500" fill="#9CA3AF">
    Early.com
  </text>
</svg>
